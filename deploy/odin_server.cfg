[server]
debug_mode = 1
http_port = 8888
http_addr = 127.0.0.1
static_path = /odin/example_detector/static
adapters = detector, fr, fp, live, system

[tornado]
logging = info

[adapter.detector]
module = example_detector.example_detector_adapter.ExampleDetectorAdapter
background_task_enable = 1
background_task_interval = 1.0
ports = 61649, 61650, 61651, 61652

[adapter.fr]
module = odin_data.control.frame_receiver_adapter.FrameReceiverAdapter
endpoints = 127.0.0.1:10000, 127.0.0.1:10010, 127.0.0.1:10020, 127.0.0.1:10030
update_interval = 0.2

[adapter.fp]
module = odin_data.control.frame_processor_adapter.FrameProcessorAdapter
endpoints = 127.0.0.1:10004, 127.0.0.1:10014, 127.0.0.1:10024, 127.0.0.1:10034
update_interval = 0.2

[adapter.live]
module = odin_data.control.live_view_adapter.LiveViewAdapter
live_view_endpoints = tcp://127.0.0.1:10005, tcp://127.0.0.1:10015, tcp://127.0.0.1:10025, tcp://127.0.0.1:10035
default_colormap = Bone

[adapter.system]
module = odin.adapters.system_info.SystemInfoAdapter
